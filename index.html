<!-- 🔥 APENAS PARTE PRINCIPAL ALTERADA (SCRIPT) -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_vqgrdyTotubZaxa2rdUYaoUaZC1uCfk",
  authDomain: "fit-smart-65928.firebaseapp.com",
  projectId: "fit-smart-65928",
  storageBucket: "fit-smart-65928.appspot.com",
  messagingSenderId: "166572903350",
  appId: "1:166572903350:web:24050ab69058095f708f17"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let userData = null;
const root = document.getElementById("root");

//////////////////////////////////////////////////
// 🔐 LOGIN COMPLETO
//////////////////////////////////////////////////

function renderLogin() {
  root.innerHTML = `
    <div class="card">
      <h2>🔐 Entrar no BOSSFIT</h2>

      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Senha">

      <button id="loginEmail" class="btn">Entrar</button>
      <button id="registerEmail" class="btn-outline">Criar conta</button>
      <button id="resetPassword" class="btn-small">Esqueci senha</button>

      <hr style="margin:15px 0">

      <button id="googleLoginBtn" class="btn">Entrar com Google</button>

      <div id="errorMsg" class="error-msg"></div>
    </div>
  `;

  document.getElementById("loginEmail").onclick = loginEmail;
  document.getElementById("registerEmail").onclick = registerEmail;
  document.getElementById("resetPassword").onclick = resetPassword;

  document.getElementById("googleLoginBtn").onclick = async () => {
    await signInWithPopup(auth, provider);
  };
}

async function loginEmail() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const user = await signInWithEmailAndPassword(auth, email, password);

    if (!user.user.emailVerified) {
      alert("Verifique seu email 📩");
      return;
    }

  } catch (e) {
    document.getElementById("errorMsg").innerText = e.message;
  }
}

async function registerEmail() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const user = await createUserWithEmailAndPassword(auth, email, password);
    await sendEmailVerification(user.user);
    alert("Conta criada! Verifique seu email 📩");
  } catch (e) {
    document.getElementById("errorMsg").innerText = e.message;
  }
}

async function resetPassword() {
  const email = document.getElementById("email").value;
  await sendPasswordResetEmail(auth, email);
  alert("Email enviado 📩");
}

//////////////////////////////////////////////////
// 👤 USERNAME ÚNICO
//////////////////////////////////////////////////

function renderCriarUsername() {
  root.innerHTML = `
    <div class="card">
      <h2>👤 Criar Username</h2>
      <input id="usernameInput" placeholder="Ex: victin123">
      <div id="userError" class="error-msg"></div>
      <button id="saveUsername" class="btn">Continuar</button>
    </div>
  `;

  document.getElementById("saveUsername").onclick = salvarUsername;
}

async function salvarUsername() {
  const username = document.getElementById("usernameInput").value.toLowerCase();
  const errorDiv = document.getElementById("userError");

  if (!username || username.length < 3) {
    errorDiv.innerText = "Nome inválido";
    return;
  }

  const ref = doc(db, "usernames", username);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    errorDiv.innerText = "Nome já existe ❌";
    return;
  }

  await setDoc(ref, { uid: currentUser.uid });

  await setDoc(doc(db, "usuarios", currentUser.uid), {
    nome: currentUser.displayName,
    username,
    email: currentUser.email
  });

  loadDashboard();
}

//////////////////////////////////////////////////
// 🏠 DASHBOARD (com alimentação melhorada)
//////////////////////////////////////////////////

function renderDashboard() {
  root.innerHTML = `
    <div class="card">
      <h2>🔥 Bem-vindo ${userData.nome}</h2>
      <p>@${userData.username}</p>

      <p><strong>🍽️ Pré-treino:</strong>
      ${userData.objetivo === "hipertrofia" ? "Banana + aveia + café ☕" :
        userData.objetivo === "emagrecimento" ? "Café + ovo + fruta 🍎" :
        "Carbo leve + hidratação 💧"}
      </p>

      <p><strong>🍽️ Pós-treino:</strong>
      ${userData.objetivo === "hipertrofia" ? "Frango + arroz + creatina 💪" :
        userData.objetivo === "emagrecimento" ? "Proteína + salada 🥗" :
        "Proteína + carbo equilibrado ⚡"}
      </p>

      <button id="logoutBtn" class="btn-small">Sair</button>
    </div>
  `;

  document.getElementById("logoutBtn").onclick = async () => {
    await signOut(auth);
    renderLogin();
  };
}

//////////////////////////////////////////////////
// 🔄 LOAD
//////////////////////////////////////////////////

async function loadDashboard() {
  const ref = doc(db, "usuarios", currentUser.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    userData = snap.data();
    renderDashboard();
  }
}

//////////////////////////////////////////////////
// 🔥 AUTH STATE
//////////////////////////////////////////////////

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;

    const ref = doc(db, "usuarios", user.uid);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      userData = snap.data();
      renderDashboard();
    } else {
      renderCriarUsername();
    }

  } else {
    renderLogin();
  }
});
</script>
